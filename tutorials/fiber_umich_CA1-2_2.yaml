_base_: bases/mednext.yaml
experiment_name: fiber_umich_CA1-2_2
description: Fine-tune Model 1 on UMich CA1-2_2, Optuna tune on same volume

system:
  training:
    num_gpus: 1
    num_cpus: 8
    num_workers: 8
    batch_size: 4
  inference:
    num_cpus: 1
    num_workers: 1
    batch_size: 1
  seed: 42

model:
  out_channels: 3
  input_size:
  - 32
  - 96
  - 96
  output_size:
  - 32
  - 96
  - 96
  mednext_size: S
  mednext_kernel_size: 3
  deep_supervision: false
  loss_functions:
  - WeightedBCEWithLogitsLoss
  - DiceLoss
  - WeightedBCEWithLogitsLoss
  - DiceLoss
  - WeightedMSELoss
  loss_weights:
  - 4.0
  - 2.0
  - 1.0
  - 0.5
  - 2.0
  loss_kwargs:
  - reduction: mean
    pos_weight: 20.0
  - sigmoid: true
    smooth_nr: 1e-5
    smooth_dr: 1e-5
  - reduction: mean
  - sigmoid: true
    smooth_nr: 1e-5
    smooth_dr: 1e-5
  - tanh: true
  multi_task_config:
  - - 0
    - 1
    - binary
    - - 0
      - 1
  - - 1
    - 2
    - instance_boundary
    - - 2
      - 3
  - - 2
    - 3
    - skeleton_aware_edt
    - - 4

data:
  train_image:
  - /projects/weilab/dataset/barcode/2026/umich/0112-5-CA1-2_2.tif
  train_label:
  - /projects/weilab/dataset/barcode/2026/umich/seg 0112-5-CA1-2_2_Mehul.tif
  train_resolution:
  - 40
  - 16
  - 16
  use_preloaded_cache: true
  persistent_workers: false
  patch_size:
  - 32
  - 96
  - 96
  iter_num_per_epoch: 1000
  image_transform:
    clip_percentile_low: 0.005
    clip_percentile_high: 0.995
    pad_size:
    - 8
    - 16
    - 16
    pad_mode: reflect
  label_transform:
    targets:
    - name: binary
      kwargs: {}
    - name: instance_boundary
      kwargs:
        thickness: 1
        edge_mode: all
        mode: 2d
    - name: skeleton_aware_edt
      kwargs:
        resolution:
        - 40
        - 16
        - 16
        alpha: 1
        bg_value: -1.0
        relabel: true
  augmentation:
    preset: some
    flip:
      enabled: true
    rotate:
      enabled: true
      spatial_axes:
      - 1
      - 2
    affine:
      enabled: true
      prob: 0.5
      rotate_range:
      - 0.2
      - 0.2
      - 0.2
      scale_range:
      - 0.1
      - 0.1
      - 0.1
      shear_range:
      - 0.1
      - 0.1
      - 0.1
    elastic:
      enabled: true
      prob: 0.3
      sigma_range:
      - 8.0
      - 10.0
      magnitude_range:
      - 20.0
      - 50.0
    intensity:
      enabled: true
      gaussian_noise_prob: 0
      shift_intensity_prob: 0.3
      shift_intensity_offset: 0.1
      contrast_prob: 0.3
      contrast_range:
      - 0.7
      - 1.4

optimization:
  max_epochs: 15
  accumulate_grad_batches: 1
  precision: 16-mixed
  optimizer:
    lr: 0.000001
    weight_decay: 0.01
    eps: 1.0e-08
  scheduler:
    name: CosineAnnealingWarmRestarts
    warmup_epochs: 2
    warmup_start_lr: 1.0e-08
    min_lr: 1.0e-08
    T_0: 8
    T_mult: 1

monitor:
  logging:
    scalar:
      loss:
      - train_loss_total_epoch
      loss_every_n_steps: 10
      val_check_interval: 1.0
    images:
      max_images: 2
      num_slices: 4
      log_every_n_epochs: 1
  checkpoint:
    save_top_k: 3
    save_every_n_epochs: 5
  early_stopping:
    monitor: train_loss_total_epoch
    patience: 7
    min_delta: 1.0e-05
    threshold: 0.01
    divergence_threshold: 100.0

inference:
  sliding_window:
    window_size:
    - 32
    - 256
    - 256
    stride:
    - 16
    - 128
    - 128
    blending: gaussian
    sigma_scale: 0.25
    padding_mode: reflect
    pad_size:
    - 16
    - 32
    - 32
  test_time_augmentation:
    enabled: true
    channel_activations:
    - - 0
      - 1
      - sigmoid
    - - 1
      - 2
      - sigmoid
    - - 2
      - 3
      - tanh
  decoding:
  - name: decode_instance_binary_contour_distance
    kwargs:
      binary_threshold:
      - 0.162
      - 0.0
      contour_threshold:
      - 0.777
      - 1.1
      distance_threshold:
      - 0.160
      - 0.0
      min_instance_size: 100
      min_seed_size: 5
  evaluation:
    enabled: true
    metrics:
    - adapted_rand

tune:
  enabled: true
  n_trials: 100
  timeout: null
  study_name: fiber_umich_CA1-2_2_decoding_optimization
  storage: null
  load_if_exists: true

  sampler:
    name: TPE
    kwargs:
      n_startup_trials: 10
      n_ei_candidates: 24
      multivariate: false

  pruner:
    enabled: false

  optimization:
    mode: single
    single_objective:
      metric: adapted_rand
      direction: minimize

  data:
    tune_image:
    - /projects/weilab/dataset/barcode/2026/umich/0112-5-CA1-2_2.tif
    tune_label:
    - /projects/weilab/dataset/barcode/2026/umich/seg 0112-5-CA1-2_2_Mehul.tif
    tune_resolution:
    - 40
    - 16
    - 16

  output:
    output_dir: "auto"
    output_pred: "auto"
    cache_suffix: _tta_prediction.h5
    save_all_trials: false
    save_best_segmentation: true
    save_study: false
    visualizations:
      enabled: false
    report:
      enabled: true
      top_n_trials: 10
      format: markdown

  logging:
    verbose: true
    optuna_log_level: INFO
    show_progress_bar: true

  parameter_space:
    decoding:
      function_name: decode_instance_binary_contour_distance
      defaults:
        binary_threshold: [0.162, 0.0]
        contour_threshold: [0.777, 1.1]
        distance_threshold: [0.160, 0.0]
        min_seed_size: 5
      parameters:
        binary_threshold_seed:
          type: float
          range: [0.0, 1.0]
          step: null
          param_group: binary_threshold
          tuple_index: 0
        binary_threshold_foreground:
          type: float
          range: [0.0, 0.5]
          step: null
          param_group: binary_threshold
          tuple_index: 1
        contour_threshold_seed:
          type: float
          range: [0.0, 1.0]
          step: null
          param_group: contour_threshold
          tuple_index: 0
        contour_threshold_foreground:
          type: float
          range: [0.5, 1.1]
          step: null
          param_group: contour_threshold
          tuple_index: 1
        distance_threshold_seed:
          type: float
          range: [-1.0, 1.0]
          step: null
          param_group: distance_threshold
          tuple_index: 0
        distance_threshold_foreground:
          type: float
          range: [-1.0, 0.5]
          step: null
          param_group: distance_threshold
          tuple_index: 1
        min_seed_size:
          type: int
          range: [1, 50]
          step: 1
    postprocessing:
      enabled: true
      defaults:
        thres_small: 100
        mode: background
      parameters:
        thres_small:
          type: int
          range: [10, 2000]
          step: 10
